substitutions:
  name: seeed-xiao-esp32c3
  friendly_name: "XIAO ESP32C3"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: codex.board-triage
    version: 0.4.0

esp32:
  board: seeed_xiao_esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "${name} FB"

web_server:
  port: 80
  version: 3

captive_portal:

dashboard_import:
  package_import_url: github://kamilzierke/board_triage/boards/seeed_xiao_esp32c3.yaml@main
  import_full_config: false

debug:
  update_interval: 60s

sensor:
  - platform: debug
    free:
      name: "${friendly_name} Heap Free"
    block:
      name: "${friendly_name} Heap Max Block"
    fragmentation:
      name: "${friendly_name} Heap Fragmentation"
    loop_time:
      name: "${friendly_name} Loop Time"
    cpu_frequency:
      name: "${friendly_name} CPU Frequency"
    min_free:
      name: "${friendly_name} Heap Min Free"

text_sensor:
  - platform: debug
    device:
      name: "${friendly_name} Device Info"
    reset_reason:
      name: "${friendly_name} Reset Reason"

  - platform: template
    id: charge_led_note
    name: "${friendly_name} Charge LED Note"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      return std::string("Charge LED is hardware-managed and is not exposed as a controllable GPIO.");

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

binary_sensor:
  - platform: gpio
    id: boot_button
    name: "${friendly_name} BOOT Button"
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
