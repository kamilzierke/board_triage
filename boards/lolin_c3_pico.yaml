substitutions:
  name: lolin-c3-pico
  friendly_name: "LOLIN C3 Pico"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: codex.board-triage
    version: 0.4.0

  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: onboard_rgb
          brightness: 45%
          effect: Rainbow

esp32:
  board: lolin_c3_mini
  flash_size: 4MB
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome

wifi:
  ap:
    ssid: "${name} FB"

web_server:
  port: 80
  version: 3

captive_portal:

dashboard_import:
  package_import_url: github://kamilzierke/board_triage/boards/lolin_c3_pico.yaml@main
  import_full_config: false

debug:
  update_interval: 60s

sensor:
  - platform: debug
    free:
      name: "${friendly_name} Heap Free"
    block:
      name: "${friendly_name} Heap Max Block"
    fragmentation:
      name: "${friendly_name} Heap Fragmentation"
    loop_time:
      name: "${friendly_name} Loop Time"
    cpu_frequency:
      name: "${friendly_name} CPU Frequency"
    min_free:
      name: "${friendly_name} Heap Min Free"

  - platform: adc
    id: battery_voltage
    name: "${friendly_name} Battery Voltage"
    pin: GPIO3
    attenuation: 12db
    update_interval: 30s
    disabled_by_default: true
    filters:
      - multiply: 2.0
    entity_category: diagnostic
    accuracy_decimals: 2
    device_class: voltage
    unit_of_measurement: V

text_sensor:
  - platform: debug
    device:
      name: "${friendly_name} Device Info"
    reset_reason:
      name: "${friendly_name} Reset Reason"

i2c:
  sda: GPIO8
  scl: GPIO10
  scan: true

spi:
  clk_pin: GPIO1
  mosi_pin: GPIO4
  miso_pin: GPIO0

binary_sensor:
  - platform: gpio
    id: boot_button
    name: "${friendly_name} BOOT Button"
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true

light:
  - platform: esp32_rmt_led_strip
    id: onboard_rgb
    name: "${friendly_name} RGB LED"
    pin: GPIO7
    num_leds: 1
    rgb_order: RGB
    chipset: WS2812
    restore_mode: ALWAYS_ON
    effects:
      - addressable_rainbow:
          name: Rainbow
          speed: 10
          width: 50
